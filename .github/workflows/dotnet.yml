name: Build & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore AsusFanControl.sln

      - name: Build (Release x64)
        run: msbuild AsusFanControl.sln /p:Configuration=Release /p:Platform=x64 /p:DeployOnBuild=false

      - name: Collect artifacts
        run: |
          mkdir publish
          copy bin\x64\Release\AsusFanControlGUI.exe publish\ 2>nul
          copy bin\x64\Release\AsusFanControlGUI.exe.config publish\ 2>nul
          copy bin\x64\Release\AsusFanControl.exe publish\ 2>nul
          copy bin\x64\Release\AsusFanControl.exe.config publish\ 2>nul
          copy bin\x64\Release\*.dll publish\ 2>nul
          copy AsusFanControlGUI\AppIcon.ico publish\ 2>nul
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsusFanControlEnhanced
          path: publish\
